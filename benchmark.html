<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Benchmark redirect</title>
</head>
<body>
  <p>Preparando benchmark…</p>
  <script>
    const params = new URLSearchParams(location.search);
    const sample = params.get('n') || '5000';
    const mode = params.get('mode') || 'career';
    if (mode === 'career') {
      localStorage.setItem('matchday-new-game', JSON.stringify({
        seed: 42424242,
        clubName: 'Atlético Fênix',
        managerName: 'Ricardo Teste',
        division: 'A',
        clubStatus: { environment: 75, support: 70, board: 72, finances: 68 },
        season: 2026,
        version: 4,
        createdAt: new Date().toISOString()
      }));
      localStorage.removeItem('matchday-season');
      localStorage.removeItem('matchday-live-match');
    } else {
      localStorage.removeItem('matchday-new-game');
      localStorage.removeItem('matchday-season');
    }
    location.replace(`index.html?engineTest&autoBenchmark=${sample}&pairing=${params.get('pairing')||'mixed'}`);
  </script>
</body>
</html>
