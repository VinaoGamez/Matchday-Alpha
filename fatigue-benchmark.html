<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Fatigue Benchmark</title>
</head>
<body>
  <p id="status">Inicializando…</p>
  <pre id="output"></pre>
  <iframe id="game" src="index.html?engineTest" style="display:none;width:0;height:0;border:0"></iframe>
  <script>
    const SAMPLE = Number(new URLSearchParams(location.search).get('n')) || 10;
    localStorage.setItem('matchday-new-game', JSON.stringify({
      seed: 42424242,
      clubName: 'Atlético Fênix',
      managerName: 'Ricardo Teste',
      division: 'A',
      clubStatus: { environment: 75, support: 70, board: 72, finances: 68 },
      season: 2026,
      version: 4,
      createdAt: new Date().toISOString()
    }));
    localStorage.removeItem('matchday-season');
    localStorage.removeItem('matchday-live-match');

    const status = document.getElementById('status');
    const output = document.getElementById('output');
    const iframe = document.getElementById('game');

    function fatigueStats(fatigueMap, starters) {
      const values = starters.map(name => fatigueMap[name]).filter(v => typeof v === 'number');
      if (!values.length) return null;
      const avg = values.reduce((a, b) => a + b, 0) / values.length;
      const min = Math.min(...values);
      const max = Math.max(...values);
      const below70 = values.filter(v => v < 70).length;
      const below55 = values.filter(v => v < 55).length;
      return { avg: Number(avg.toFixed(1)), min: Number(min.toFixed(1)), max: Number(max.toFixed(1)), below70, below55, count: values.length };
    }

    function runBenchmark(win, count) {
      const exp = win.__matchdayEngineExports || {};
      const simulate = exp.simulateRoundMatch;
      const clubs = exp.clubs || {};
      const names = Object.keys(clubs);
      if (typeof simulate !== 'function') throw new Error('simulateRoundMatch indisponível');

      const matches = [];
      for (let i = 0; i < count; i++) {
        const home = names[i % names.length];
        const away = names[(i * 7 + 3) % names.length];
        if (home === away) continue;
        const homeStart = Object.fromEntries(clubs[home].roster.map(p => [p.name, p.fatigue]));
        const awayStart = Object.fromEntries(clubs[away].roster.map(p => [p.name, p.fatigue]));
        const result = simulate(home, away);
        const homeLineup = result.workload?.home?.filter(e => e.started).map(e => e.name) || clubs[home].roster.slice(0, 11).map(p => p.name);
        const awayLineup = result.workload?.away?.filter(e => e.started).map(e => e.name) || clubs[away].roster.slice(0, 11).map(p => p.name);
        const homeEnd = fatigueStats(result.fatigueAfter?.home || {}, homeLineup);
        const awayEnd = fatigueStats(result.fatigueAfter?.away || {}, awayLineup);
        const homeDrop = homeEnd ? Number((Object.values(homeStart).slice(0, 11).reduce((s, v, idx) => {
          const name = homeLineup[idx];
          const end = result.fatigueAfter?.home?.[name];
          return s + (typeof end === 'number' ? v - end : 0);
        }, 0) / Math.max(1, homeLineup.length)).toFixed(1)) : 0;
        const awayDrop = awayEnd ? Number((awayLineup.reduce((s, name) => {
          const start = homeStart[name] ?? clubs[away].roster.find(p => p.name === name)?.fatigue ?? 0;
          const end = result.fatigueAfter?.away?.[name];
          return s + (typeof end === 'number' ? start - end : 0);
        }, 0) / Math.max(1, awayLineup.length)).toFixed(1)) : 0;
        matches.push({
          home, away, score: `${result.homeGoals}-${result.awayGoals}`,
          subs: (result.substitutions?.home || 0) + (result.substitutions?.away || 0),
          homeEnd, awayEnd, homeDrop, awayDrop,
          fatigueSubs: (result.events || []).filter(e => e.type === 'substitution').length
        });
      }

      const avgEnd = arr => Number((arr.reduce((s, v) => s + v, 0) / Math.max(1, arr.length)).toFixed(1));
      const allHomeEnd = matches.map(m => m.homeEnd?.avg).filter(Boolean);
      const allAwayEnd = matches.map(m => m.awayEnd?.avg).filter(Boolean);
      const allDrops = matches.flatMap(m => [m.homeDrop, m.awayDrop]).filter(v => v > 0);

      return {
        sampleSize: matches.length,
        summary: {
          avgEndFatigueHome: avgEnd(allHomeEnd),
          avgEndFatigueAway: avgEnd(allAwayEnd),
          avgFatigueDropPerStarter: avgEnd(allDrops),
          avgSubsPerMatch: avgEnd(matches.map(m => m.subs)),
          matchesWithStarterBelow70: matches.filter(m => (m.homeEnd?.below70 || 0) + (m.awayEnd?.below70 || 0) > 0).length,
          matchesWithStarterBelow55: matches.filter(m => (m.homeEnd?.below55 || 0) + (m.awayEnd?.below55 || 0) > 0).length
        },
        matches
      };
    }

    iframe.addEventListener('load', () => {
      const started = Date.now();
      const poll = setInterval(() => {
        const win = iframe.contentWindow;
        if (win?.__matchdayEngineExports?.simulateRoundMatch) {
          clearInterval(poll);
          try {
            status.textContent = `Rodando ${SAMPLE} simulações…`;
            const report = runBenchmark(win, SAMPLE);
            report.elapsedMs = Date.now() - started;
            output.textContent = JSON.stringify(report, null, 2);
            status.textContent = 'Concluído';
            document.title = 'FATIGUE_BENCHMARK_DONE';
          } catch (err) {
            output.textContent = String(err.stack || err);
            status.textContent = 'Erro';
            document.title = 'FATIGUE_BENCHMARK_ERROR';
          }
        } else if (Date.now() - started > 120000) {
          clearInterval(poll);
          status.textContent = 'Timeout';
          document.title = 'FATIGUE_BENCHMARK_ERROR';
        }
      }, 250);
    });
  </script>
</body>
</html>
